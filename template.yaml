AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AI Pavilion Phase 4 controlled-pilot development foundation

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev]

  AllowedOrigin:
    Type: String
    Default: http://127.0.0.1:3000
    Description: Exact frontend origin allowed by CORS.

  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: sk_test_not_configured
    Description: Stripe test-mode secret key. Use a real sk_test value only in dev.

  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: whsec_not_configured
    Description: Stripe test-mode webhook signing secret.

  PaymentMode:
    Type: String
    Default: disabled
    AllowedValues: [disabled, simulated, stripe]
    Description: Use simulated only for disposable development stacks.

  AppUrl:
    Type: String
    Default: http://127.0.0.1:3000
    Description: Exact frontend base URL used for invitation and billing return links.

  BillingMode:
    Type: String
    Default: disabled
    AllowedValues: [disabled, simulated, stripe]

  StripeBillingWebhookSecret:
    Type: String
    NoEcho: true
    Default: whsec_billing_not_configured

  StripePilotPriceId:
    Type: String
    Default: price_pilot_not_configured

  StripeStarterPriceId:
    Type: String
    Default: price_starter_not_configured

  StripeProfessionalPriceId:
    Type: String
    Default: price_professional_not_configured

  InvitationEmailMode:
    Type: String
    Default: simulated
    AllowedValues: [disabled, simulated, ses]

  InvitationEmailFrom:
    Type: String
    Default: no-reply@example.invalid

  BotChallengeMode:
    Type: String
    Default: simulated
    AllowedValues: [disabled, simulated, turnstile]

  BotChallengeSecret:
    Type: String
    NoEcho: true
    Default: turnstile_not_configured

  AuditRetentionDays:
    Type: Number
    Default: 365
    MinValue: 30
    MaxValue: 2555

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        ALLOWED_ORIGIN: !Ref AllowedOrigin
        APP_URL: !Ref AppUrl
        AUDIT_RETENTION_DAYS: !Ref AuditRetentionDays

  Api:
    Cors:
      AllowOrigin: !Sub "'${AllowedOrigin}'"
      AllowHeaders: "'Content-Type,Authorization,X-Stripe-Signature,X-Request-Id,Idempotency-Key,X-Interaction-Id'"
      AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

Resources:
  StripeSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Description: !Sub Stripe test-mode credentials for ${AWS::StackName}
      SecretString: !Sub '{"stripeSecretKey":"${StripeSecretKey}","stripeWebhookSecret":"${StripeWebhookSecret}","stripeBillingWebhookSecret":"${StripeBillingWebhookSecret}"}'

  BotChallengeCredentials:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Description: !Sub Anonymous-form bot challenge credential for ${AWS::StackName}
      SecretString: !Sub '{"turnstileSecret":"${BotChallengeSecret}"}'

  UserPool:
    Type: AWS::Cognito::UserPool
    DependsOn: ProfileSyncPermission
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-users
      LambdaConfig:
        PostConfirmation: !GetAtt ProfileSyncFunction.Arn
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      MfaConfiguration: "OFF"
      DeletionProtection: INACTIVE
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 3
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: given_name
          Required: false
          Mutable: true
        - Name: family_name
          Required: false
          Mutable: true
        - Name: company
          AttributeDataType: String
          DeveloperOnlyAttribute: false
          Mutable: true
          Required: false
          StringAttributeConstraints:
            MinLength: "0"
            MaxLength: "160"
      UserPoolTags:
        application: ai-pavilion
        environment: !Ref Environment

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${AWS::StackName}-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 7
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ReadAttributes:
        - email
        - email_verified
        - given_name
        - family_name
        - custom:company
      WriteAttributes:
        - email
        - given_name
        - family_name
        - custom:company

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      Description: AI Pavilion platform administrators
      Precedence: 1
      UserPoolId: !Ref UserPool

  OrganizerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: organizer
      Description: Event organizers
      Precedence: 10
      UserPoolId: !Ref UserPool

  ExhibitorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: exhibitor
      Description: Stand owners and editors
      Precedence: 20
      UserPoolId: !Ref UserPool

  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api
      StageName: !Ref Environment
      TracingEnabled: true
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Sub arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPool}
            Identity:
              Header: Authorization
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 100
          ThrottlingBurstLimit: 200

  StandsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-stands
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: stand_id
          AttributeType: S
        - AttributeName: category
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: publicationKey
          AttributeType: S
        - AttributeName: publicStatus
          AttributeType: S
        - AttributeName: ownerUserId
          AttributeType: S
        - AttributeName: updatedAt
          AttributeType: S
      KeySchema:
        - AttributeName: stand_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: category-index
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: event-stands-index
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: publicationKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: public-stands-index
          KeySchema:
            - AttributeName: publicStatus
              KeyType: HASH
            - AttributeName: publicationKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: owner-stands-index
          KeySchema:
            - AttributeName: ownerUserId
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  OrdersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-orders-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  PaymentEventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-payment-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  LeadsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-leads
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: leadId
          AttributeType: S
        - AttributeName: standId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: organizationId
          AttributeType: S
      KeySchema:
        - AttributeName: leadId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: stand-leads-index
          KeySchema:
            - AttributeName: standId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: organization-leads-index
          KeySchema:
            - AttributeName: organizationId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  InteractionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-interactions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: interactionId
          AttributeType: S
        - AttributeName: standId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
      KeySchema:
        - AttributeName: interactionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: stand-created-index
          KeySchema:
            - AttributeName: standId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: event-created-index
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  SavedStandsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-saved-stands
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: standId
          AttributeType: S
        - AttributeName: savedAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: standId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user-saved-at-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: savedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  OrganizationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-organizations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: organizationId
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: organizationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: organization-slug-index
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  MembershipsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-memberships
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: organizationId
          AttributeType: S
        - AttributeName: membershipKey
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: organizationId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: organization-members-index
          KeySchema:
            - AttributeName: organizationId
              KeyType: HASH
            - AttributeName: membershipKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  EventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: organizationId
          AttributeType: S
        - AttributeName: startsAt
          AttributeType: S
        - AttributeName: publicStatus
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: organization-events-index
          KeySchema:
            - AttributeName: organizationId
              KeyType: HASH
            - AttributeName: startsAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: public-events-index
          KeySchema:
            - AttributeName: publicStatus
              KeyType: HASH
            - AttributeName: startsAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  InvitationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-invitations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: invitationId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: organizationEventKey
          AttributeType: S
      KeySchema:
        - AttributeName: invitationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-invitations-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: event-invitations-index
          KeySchema:
            - AttributeName: organizationEventKey
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  EntitlementsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-entitlements
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: organizationId
          AttributeType: S
      KeySchema:
        - AttributeName: organizationId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  AuditEventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-audit-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: auditId
          AttributeType: S
        - AttributeName: organizationId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: auditId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: organization-audit-index
          KeySchema:
            - AttributeName: organizationId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  SchemaMigrationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-schema-migrations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: migrationId
          AttributeType: S
      KeySchema:
        - AttributeName: migrationId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true

  GetStandsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [get-stands/index.js]
        Format: cjs
        Minify: true
        Sourcemap: true
        Target: es2022
    Properties:
      FunctionName: !Sub ${AWS::StackName}-get-stands
      CodeUri: backend/lambda/
      Handler: get-stands/index.handler
      Environment:
        Variables:
          STANDS_TABLE: !Ref StandsTable
          PUBLIC_STANDS_INDEX: public-stands-index
          EVENT_STANDS_INDEX: event-stands-index
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref StandsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /stands
            Method: GET

  GetStandDetailFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [get-stand-detail/index.js]
        Format: cjs
        Minify: true
        Sourcemap: true
        Target: es2022
    Properties:
      FunctionName: !Sub ${AWS::StackName}-get-stand-detail
      CodeUri: backend/lambda/
      Handler: get-stand-detail/index.handler
      Environment:
        Variables:
          STANDS_TABLE: !Ref StandsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref StandsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /stands/{standId}
            Method: GET

  SearchStandsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [search-stands/index.js]
        Format: cjs
        Minify: true
        Sourcemap: true
        Target: es2022
    Properties:
      FunctionName: !Sub ${AWS::StackName}-search-stands
      CodeUri: backend/lambda/
      Handler: search-stands/index.handler
      Environment:
        Variables:
          STANDS_TABLE: !Ref StandsTable
          PUBLIC_STANDS_INDEX: public-stands-index
          EVENT_STANDS_INDEX: event-stands-index
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref StandsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /stands/search
            Method: GET

  CheckoutFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [checkout/index.js]
        Format: cjs
        Minify: true
        Sourcemap: true
        Target: es2022
    Properties:
      FunctionName: !Sub ${AWS::StackName}-checkout
      CodeUri: backend/lambda/
      Handler: checkout/index.handler
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable
          STANDS_TABLE: !Ref StandsTable
          STRIPE_SECRET_KEY_ARN: !Ref StripeSecret
          PAYMENT_MODE: !Ref PaymentMode
          PAYMENT_EVENTS_TABLE: !Ref PaymentEventsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentEventsTable
        - DynamoDBReadPolicy:
            TableName: !Ref StandsTable
        - Statement:
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Ref StripeSecret
      Events:
        CreateIntent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /checkout/create-intent
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        ConfirmOrder:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /checkout/confirm-order
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        GetOrder:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /checkout/order/{orderId}
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        Webhook:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /checkout/webhook
            Method: POST
            Auth:
              Authorizer: NONE

  AdminFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [admin/index.js]
        Format: cjs
        Minify: true
        Sourcemap: true
        Target: es2022
    Properties:
      FunctionName: !Sub ${AWS::StackName}-admin
      CodeUri: backend/lambda/
      Handler: admin/index.handler
      Environment:
        Variables:
          STANDS_TABLE: !Ref StandsTable
          ORDERS_TABLE: !Ref OrdersTable
          USERS_TABLE: !Ref UsersTable
          INTERACTIONS_TABLE: !Ref InteractionsTable
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_CLIENT_ID: !Ref UserPoolClient
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StandsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref InteractionsTable
        - Statement:
            Effect: Allow
            Action: cognito-idp:ListUsers
            Resource: !Sub arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPool}
      Events:
        Dashboard:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /admin/dashboard
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        Stands:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /admin/stands
            Method: ANY
            Auth:
              Authorizer: CognitoAuthorizer
        StandById:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /admin/stands/{standId}
            Method: ANY
            Auth:
              Authorizer: CognitoAuthorizer
        Users:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /admin/users
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        Orders:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /admin/orders
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        Analytics:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /admin/analytics
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  UserSavedStandsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [user-saved-stands/index.js]
        Format: cjs
        Minify: true
        Sourcemap: true
        Target: es2022
    Properties:
