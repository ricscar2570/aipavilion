AWSTemplateFormatVersion: "2010-09-09"
Description: AI Pavilion Phase 4 WAF, monitoring, backup and cost controls

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
  ApiGatewayId:
    Type: String
  ApiName:
    Type: String
  ApiStage:
    Type: String
  AlertEmail:
    Type: String
  MonthlyBudgetUsd:
    Type: Number
    Default: 150
    MinValue: 10
  BackupResourceArns:
    Type: CommaDelimitedList

Resources:
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-alerts
  AlertsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  ApiWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub ${AWS::StackName}-api
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub ${AWS::StackName}-api-waf
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedCommon
          Priority: 10
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: managed-common
            SampledRequestsEnabled: true
        - Name: AWSManagedKnownBadInputs
          Priority: 20
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: managed-known-bad-inputs
            SampledRequestsEnabled: true
        - Name: AWSManagedIpReputation
          Priority: 30
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: managed-ip-reputation
            SampledRequestsEnabled: true
        - Name: AnonymousRateLimit
          Priority: 40
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 500
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: anonymous-rate-limit
            SampledRequestsEnabled: true

  ApiWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      WebACLArn: !GetAtt ApiWebAcl.Arn
      ResourceArn: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/${ApiGatewayId}/stages/${ApiStage}

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: API Gateway 5xx errors exceed the pilot threshold
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Ref ApiName
        - Name: Stage
          Value: !Ref ApiStage
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  ApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: API Gateway p95 latency exceeds two seconds
      Namespace: AWS/ApiGateway
      MetricName: Latency
      ExtendedStatistic: p95
      Dimensions:
        - Name: ApiName
          Value: !Ref ApiName
        - Name: Stage
          Value: !Ref ApiStage
      Period: 300
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 2000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  WafBlockedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: WAF is blocking an unusual volume of requests
      Namespace: AWS/WAFV2
      MetricName: BlockedRequests
      Dimensions:
        - Name: WebACL
          Value: !GetAtt ApiWebAcl.Name
        - Name: Region
          Value: !Ref AWS::Region
        - Name: Rule
          Value: ALL
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}-operations
      DashboardBody: !Sub |
        {
          "widgets": [
            {"type":"metric","x":0,"y":0,"width":12,"height":6,"properties":{"title":"API errors","region":"${AWS::Region}","metrics":[["AWS/ApiGateway","5XXError","ApiName","${ApiName}","Stage","${ApiStage}"],[".","4XXError",".",".",".","."]],"period":300,"stat":"Sum"}},
            {"type":"metric","x":12,"y":0,"width":12,"height":6,"properties":{"title":"API latency","region":"${AWS::Region}","metrics":[["AWS/ApiGateway","Latency","ApiName","${ApiName}","Stage","${ApiStage}"]],"period":300,"stat":"p95"}},
            {"type":"metric","x":0,"y":6,"width":12,"height":6,"properties":{"title":"WAF requests","region":"${AWS::Region}","metrics":[["AWS/WAFV2","AllowedRequests","WebACL","${ApiWebAcl.Name}","Region","${AWS::Region}","Rule","ALL"],[".","BlockedRequests",".",".",".",".",".","."]],"period":300,"stat":"Sum"}}
          ]
        }

  BackupVault:
    Type: AWS::Backup::BackupVault
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BackupVaultName: !Sub ${AWS::StackName}-vault

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - arn:aws:iam::aws:policy/AWSBackupServiceRolePolicyForRestores

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${AWS::StackName}-daily
        BackupPlanRule:
          - RuleName: daily-retained
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 3 * * ? *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 35

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub ${AWS::StackName}-dynamodb
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources: !Ref BackupResourceArns

  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub ${AWS::StackName}-monthly
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUsd
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref AlertEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref AlertEmail

Outputs:
  AlertsTopicArn:
    Value: !Ref AlertsTopic
  WebAclArn:
    Value: !GetAtt ApiWebAcl.Arn
  BackupVaultName:
    Value: !Ref BackupVault
  DashboardName:
    Value: !Ref Dashboard
